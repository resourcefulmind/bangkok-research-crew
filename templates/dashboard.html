<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangkok Research Crew</title>
    <style>
        {% include "_tokens.html" %}

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* Screen switching: exactly one screen visible at a time.
           The state machine (Step 4) toggles the `active` class. */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Error banner lives outside the screens — an error can surface in any state. */
        .error-banner {
            background: #fff0f0;
            color: #8a1f1f;
            border: 1px solid #f3c0c0;
            border-radius: 10px;
            padding: 14px 18px;
            margin: 0 auto 24px;
            max-width: 820px;
        }
        .error-banner[hidden] { display: none; }

        .title { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; }
        .subtitle { color: var(--text-secondary); margin: 6px 0 28px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            box-shadow: var(--shadow-sm);
        }

        .field-label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input[type="date"] {
            font: inherit;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .categories { border: 0; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 14px; }
        .categories label { font-size: 14px; color: var(--text-secondary); cursor: pointer; }

        .btn-primary {
            font: inherit;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: 0;
            border-radius: 999px;
            padding: 11px 26px;
            cursor: pointer;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: default; }
    </style>
</head>
<body>
    <div id="error-banner" class="error-banner" role="alert" hidden></div>

    <main class="container">
        <!-- State 1: start screen (date, categories, run button) -->
        <section id="screen-start" class="screen active">
            <h1 class="title">Bangkok Research Crew</h1>
            <p class="subtitle">Find and rank the day's top AI papers from ArXiv.</p>

            <form id="start-form" class="card">
                <label class="field-label" for="date">Date</label>
                <input type="date" id="date" name="date" required>

                <fieldset class="categories">
                    <legend class="field-label">Categories</legend>
                    <label><input type="checkbox" name="category" value="cs.AI" checked> cs.AI</label>
                    <label><input type="checkbox" name="category" value="cs.LG" checked> cs.LG</label>
                    <label><input type="checkbox" name="category" value="cs.CL" checked> cs.CL</label>
                    <label><input type="checkbox" name="category" value="cs.CV" checked> cs.CV</label>
                    <label><input type="checkbox" name="category" value="stat.ML" checked> stat.ML</label>
                </fieldset>

                <button type="submit" class="btn-primary">Run</button>
            </form>
        </section>

        <!-- State 2: pipeline running (5 agent cards / stepper) -->
        <section id="screen-running" class="screen" aria-live="polite">
            <h1>Running</h1>
        </section>

        <!-- State 3: feedback checkpoint (top 10 + approve/adjust/abort) -->
        <section id="screen-feedback" class="screen">
            <h1>Feedback</h1>
        </section>

        <!-- State 4: final report -->
        <section id="screen-report" class="screen">
            <h1>Report</h1>
        </section>
    </main>

    <script>
        // ── State machine ───────────────────────────────────────────────
        // One source of truth for "which screen is visible." Every transition
        // goes through showScreen(): clear all, activate one. No DOM creation.
        const state = { runId: null };

        function showScreen(name) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById("screen-" + name).classList.add("active");
        }

        function showError(message) {
            const banner = document.getElementById("error-banner");
            banner.textContent = message;
            banner.hidden = false;
        }

        // ── SSE: connect to the live event stream ───────────────────────
        function connectStream(runId) {
            const source = new EventSource("/stream/" + runId);
            state.source = source;

            source.onmessage = (e) => {
                const event = JSON.parse(e.data);
                handleEvent(event);
            };

            source.onerror = () => {
                // The server closes the stream after a terminal event; that surfaces
                // here as an error too, so only complain if we didn't finish cleanly.
                if (source.readyState === EventSource.CLOSED && state.status !== "done") {
                    showError("Lost connection to the server.");
                }
            };
        }

        // ── Route each event to the right handler ────────────────────────
        function handleEvent(event) {
            switch (event.type) {
                case "agent_start":
                    // Step 6 fills this in (mark the agent card active)
                    break;
                case "agent_complete":
                    // Step 6 fills this in (mark the agent card done)
                    break;
                case "feedback_requested":
                    showScreen("feedback");
                    // Step 7 renders event.top_papers
                    break;
                case "complete":
                    state.status = "done";
                    if (state.source) state.source.close();
                    showScreen("report");
                    // Step 8 fetches event.report_url
                    break;
                case "aborted":
                    if (state.source) state.source.close();
                    showError("Run aborted" + (event.reason ? ": " + event.reason : "."));
                    break;
                case "error":
                    if (state.source) state.source.close();
                    showError(event.message || "The pipeline hit an error.");
                    break;
            }
        }

        // ── Start screen → POST /run ─────────────────────────────────────
        const startForm = document.getElementById("start-form");
        const runButton = startForm.querySelector(".btn-primary");

        startForm.addEventListener("submit", async (event) => {
            event.preventDefault();               // don't let the browser do a full-page form POST
            runButton.disabled = true;            // prevent double-submits while the request is in flight

            const date = document.getElementById("date").value;
            const categories = Array.from(
                document.querySelectorAll('input[name="category"]:checked')
            ).map(c => c.value).join(", ");

            try {
                const res = await fetch("/run", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ date, categories }),
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    showError(err.error || "Could not start the run.");
                    runButton.disabled = false;
                    return;
                }

                const data = await res.json();
                state.runId = data.run_id;
                window.location.hash = data.run_id;   // run_id in URL (locked decision)
                showScreen("running");
                connectStream(data.run_id);           // open the live SSE stream
            } catch (e) {
                showError("Network error — is the server running?");
                runButton.disabled = false;
            }
        });
    </script>
</body>
</html>
